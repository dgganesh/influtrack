<!DOCTYPE html>
<html>
<head>
    <title>Completed Campaigns</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2 class="mb-4">Completed Campaigns</h2>

<a href="/dashboard" class="btn btn-primary mb-3">← Back to Dashboard</a>

<div class="table-responsive">
<table class="table table-bordered">
    <thead class="table-light">
        <tr>
            <th>Campaign</th>
            <th>Brand</th>
            <th>Date</th>
            <th>Total Income</th>
            <th>Total Expense</th>
            <th>Profit</th>
        </tr>
    </thead>
    <tbody>
        {% for c in campaigns %}
        <tr>
            <td>{{ c.name }}</td>
            <td>{{ c.brand }}</td>
            <td>{{ c.due_date }}</td>
            <td>{{ c.amount }}</td>
            <td>{{ c.total_expense }}</td>
            <td>{{ c.amount - c.total_expense }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>

</body>
</html>
